# Cloudflare Pages 配置
# - 本地 dev 由 `npm run dev` 的 --kv / --r2 flag 自动模拟
# - KV / R2 的生产绑定在 Cloudflare Dashboard → Settings → Functions 做

name = "tanyang-portfolio"
compatibility_date = "2025-01-01"
pages_build_output_dir = "public"

[vars]
SITE_ID = "tanyang"
IMG_BASE_URL = "https://img.ggjj.app"

[[kv_namespaces]]
binding = "DATA"
id = "a211816d5f0b4fac8ec1ab7b54694230"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "zhimengsi"
